<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBASTIÁN VALDIVIESO JÁUREGUI | Cinematographer | Austin, TX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Europa:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; min-height: 100vh; }
        body {
            font-family: 'Europa', sans-serif;
            color: #e2e8f0;
            text-transform: uppercase;
            font-size: 1.2rem;
            background-image: url('https://raw.githubusercontent.com/sebastianjau/sebastianjau.github.io/refs/heads/main/cover2.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-y: scroll;
        }
        .nav-link, .dropdown-links a { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; font-weight: 400; }
        .mobile-nav-link { font-family: 'Montserrat', sans-serif; font-weight: 400; }
        .nav-link, .mobile-nav-link, .dropdown-links a { text-transform: capitalize; }
        .logo-font { font-family: 'Fira Sans', sans-serif; font-weight: 400; line-height: 1; letter-spacing: 0; }
        #main-header { padding-top: 1.4vw; padding-bottom: 1.4vw; padding-left: 3vw; padding-right: 3vw; }
        .desktop-nav-links { gap: 2.3vw; }
        body::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        @media (max-width: 1024px) {
            body { background-position: 80% center; }
        }

        /* Page fade in - only content, not navbar */
        #fade-wrapper {
            animation: fadeIn 0.4s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        #fade-wrapper.fade-out {
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }

        /* Custom breakpoint for iPad landscape */
        @media (min-width: 1100px) {
            .desktop-nav-links { display: flex !important; }
            .mobile-hamburger { display: none !important; }
        }
        @media (max-width: 1099px) {
            .desktop-nav-links { display: none !important; }
            .mobile-hamburger { display: block !important; }
        }
    </style>
</head>
<body class="antialiased">

    <div id="main-content">
        <header id="main-header" class="site-header fixed w-full top-0 z-50 transition-transform duration-300 transform">
            <nav class="w-full flex justify-between items-center">
                <a href="index.html" class="logo-font text-white">Sebastián Valdivieso Jáuregui</a>
                <div class="desktop-nav-links hidden xl:flex items-center" style="gap: 2.3vw;">
                    <a href="narrative.html" class="nav-link text-white hover:text-white hover:underline transition-colors duration-300">Narrative</a>
                    <a href="commercial.html" class="nav-link text-white hover:text-white hover:underline transition-colors duration-300">Commercial</a>
                    <a href="music-video.html" class="nav-link text-white hover:text-white hover:underline transition-colors duration-300">Music Video</a>
                    <a href="reel.html" class="nav-link text-white hover:text-white hover:underline transition-colors duration-300">Reel</a>
                    <a href="about.html" class="nav-link text-white hover:text-white hover:underline transition-colors duration-300">About</a>
                </div>
                <button id="mobile-menu-button" class="mobile-hamburger text-white xl:hidden focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </nav>
        </header>

        <div id="mobile-menu" class="fixed inset-0 bg-black bg-opacity-90 z-50 transform transition-transform duration-300 translate-x-full">
            <div class="h-full flex items-center justify-center relative">
                <button id="close-mobile-menu" class="absolute top-6 right-6 text-white focus:outline-none">
                    <i class="fas fa-times text-2xl"></i>
                </button>
                <div class="flex flex-col justify-center items-center space-y-6">
                    <a href="narrative.html" class="mobile-nav-link text-white hover:text-gray-400 text-3xl transition-colors duration-300">Narrative</a>
                    <a href="commercial.html" class="mobile-nav-link text-white hover:text-gray-400 text-3xl transition-colors duration-300">Commercial</a>
                    <a href="music-video.html" class="mobile-nav-link text-white hover:text-gray-400 text-3xl transition-colors duration-300">Music Video</a>
                    <a href="reel.html" class="mobile-nav-link text-white hover:text-gray-400 text-3xl transition-colors duration-300">Reel</a>
                    <a href="about.html" class="mobile-nav-link text-white hover:text-gray-400 text-3xl transition-colors duration-300">About</a>
                </div>
            </div>
        </div>

        <main class="h-screen"></main>
    </div>

    <script>
        const header = document.getElementById('main-header');
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY && window.scrollY > 100) { header.classList.add('-translate-y-full'); }
            else if (window.scrollY < lastScrollY) { header.classList.remove('-translate-y-full'); }
            lastScrollY = window.scrollY;
        });
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const closeMobileMenuButton = document.getElementById('close-mobile-menu');
        mobileMenuButton.addEventListener('click', () => { mobileMenu.classList.remove('translate-x-full'); });
        closeMobileMenuButton.addEventListener('click', () => { mobileMenu.classList.add('translate-x-full'); });
    </script>
</body>
</html>
